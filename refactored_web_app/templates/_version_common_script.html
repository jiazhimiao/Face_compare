<script>
  const tokenInput = document.getElementById('api-token');
  if (tokenInput) {
    const storedToken = localStorage.getItem('face-compare-token');
    if (storedToken && !tokenInput.value) {
      tokenInput.value = storedToken;
    }

    tokenInput.addEventListener('change', () => {
      localStorage.setItem('face-compare-token', tokenInput.value.trim());
    });
  }

  function metric(label, value) {
    return `<div class="metric"><span>${label}</span><strong>${value}</strong></div>`;
  }

  function renderSummary(form, payload) {
    const container = form.parentElement;
    const summary = container.querySelector('.result-summary');
    const visual = container.querySelector('.result-visual');
    const openLink = container.querySelector('.result-open');
    const emptyState = container.querySelector('.visual-empty');
    const data = payload.data;

    if (data.face_detection) {
      const item = data.face_detection;
      summary.innerHTML = `
        <div class="summary-head">
          <span class="badge ${item.has_face ? 'success' : 'danger'}">${item.has_face ? '检测到人脸' : '未检测到人脸'}</span>
        </div>
        <div class="metrics-grid">
          ${metric('人脸数量', item.face_count)}
          ${metric('结果说明', item.message)}
        </div>
      `;
    }

    if (data.identity_verification) {
      const item = data.identity_verification;
      summary.innerHTML = `
        <div class="summary-head">
          <span class="badge ${item.verified ? 'success' : 'warn'}">${item.verified ? '核验通过' : '核验未通过'}</span>
        </div>
        <div class="metrics-grid">
          ${metric('相似度', Number(item.similarity).toFixed(4))}
          ${metric('阈值', Number(item.threshold).toFixed(4))}
          ${metric('证件照人脸数', item.id_card_face_count)}
          ${metric('现场照人脸数', item.face_image_face_count)}
        </div>
      `;
    }

    if (data.blacklist_check) {
      const item = data.blacklist_check;
      summary.innerHTML = `
        <div class="summary-head">
          <span class="badge ${item.matched ? 'danger' : 'success'}">${item.matched ? '命中黑名单' : '未命中黑名单'}</span>
        </div>
        <div class="metrics-grid">
          ${metric('命中对象', item.matched_name || '无')}
          ${metric('相似度', Number(item.similarity).toFixed(4))}
          ${metric('阈值', Number(item.threshold).toFixed(4))}
        </div>
      `;
    }

    if (data.visualization_url) {
      visual.src = `${data.visualization_url}?t=${Date.now()}`;
      visual.hidden = false;
      if (emptyState) {
        emptyState.hidden = true;
      }
      if (openLink) {
        openLink.href = data.visualization_url;
        openLink.hidden = false;
      }
    }
  }

  async function submitForm(form) {
    const container = form.parentElement;
    const resultBox = container.querySelector('.result-box');
    const summary = container.querySelector('.result-summary');
    const visual = container.querySelector('.result-visual');
    const openLink = container.querySelector('.result-open');
    const emptyState = container.querySelector('.visual-empty');
    const endpoint = form.dataset.endpoint;
    const body = new FormData(form);
    const token = tokenInput ? tokenInput.value.trim() : '';
    const requestId = `web-${Date.now()}`;

    resultBox.textContent = '处理中...';
    summary.textContent = '处理中...';
    if (visual) {
      visual.hidden = true;
      visual.removeAttribute('src');
    }
    if (openLink) {
      openLink.hidden = true;
    }
    if (emptyState) {
      emptyState.hidden = false;
    }

    try {
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: {
          'X-API-Token': token,
          'X-Request-Id': requestId
        },
        body
      });
      const data = await response.json();
      resultBox.textContent = JSON.stringify(data, null, 2);
      if (data.success) {
        renderSummary(form, data);
      } else {
        summary.innerHTML = `<span class="badge danger">请求失败</span><p class="error-copy">${data.message}</p>`;
      }
    } catch (error) {
      resultBox.textContent = String(error);
      summary.innerHTML = `<span class="badge danger">请求异常</span><p class="error-copy">${String(error)}</p>`;
    }
  }

  document.querySelectorAll('.tool-form').forEach((form) => {
    form.addEventListener('submit', (event) => {
      event.preventDefault();
      submitForm(form);
    });
  });
</script>
