<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人脸比对控制台 V2 存档</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; background: #f6f1e8; color: #182338; }
    .shell { width: min(1120px, calc(100% - 32px)); margin: 0 auto; padding: 32px 0 56px; }
    .hero, .card { background: rgba(255,255,255,.82); border: 1px solid rgba(153,133,108,.18); border-radius: 24px; box-shadow: 0 18px 46px rgba(20,24,31,.08); }
    .hero { padding: 30px; margin-bottom: 18px; }
    .hero h1 { margin: 0; font-size: 2.6rem; }
    .hero p { color: #667085; line-height: 1.8; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .card { padding: 22px; }
    .card h2 { margin-top: 0; font-size: 1.2rem; }
    .tag { display: inline-block; padding: 7px 12px; border-radius: 999px; background: rgba(206,98,52,.12); color: #c05e33; font-size: .84rem; font-weight: 700; }
    .back { display: inline-block; margin-top: 14px; color: #182338; text-decoration: none; font-weight: 700; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <span class="tag">V2 存档版</span>
      <h1>上一版展示风格</h1>
      <p>这个页面保留了上一轮的产品页式结构，便于和当前的 V3 工作台版本直接做对照。V2 更偏展示说明，V3 更强调实际操作与结果分层展示。</p>
      <p>服务：{{ service_name }} | 版本：{{ service_version }} | 环境：{{ service_env }}</p>
      <a class="back" href="/">返回 V3 当前版</a>
    </section>
    <section class="grid">
      <article class="card">
        <h2>人脸检测</h2>
        <p>单图上传，返回是否检测到人脸与检测框结果。</p>
      </article>
      <article class="card">
        <h2>身份核验</h2>
        <p>上传证件照与现场照，输出相似度、阈值和核验结论。</p>
      </article>
      <article class="card">
        <h2>黑名单比对</h2>
        <p>上传待检测图片，与黑名单特征库执行 1:N 比对。</p>
      </article>
    </section>
  </main>
</body>
</html>
